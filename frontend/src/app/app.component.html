<ion-app [class.con-menu-movil]="mostrarMenuMovil()">

  <header class="navbar-global" *ngIf="mostrarNavbar()">
    <div class="navbar-logo" routerLink="/principal">
      <img src="assets/img/SanosySalvos.png" alt="Logo">
      <span>Sanos y Salvos</span>
    </div>

    <div class="navbar-acciones">
      <button *ngIf="!estaLogueado" routerLink="/login"> Ingresar </button>

      <button *ngIf="!estaLogueado" routerLink="/nuevo-usuario"> Registro </button>

      <div class="notificaciones-navbar" *ngIf="estaLogueado">
        <button class="boton-notificaciones boton-con-badge" type="button" aria-label="Notificaciones" (click)="alternarPanelNotificaciones()">
          <ion-icon name="notifications-outline"></ion-icon>
          <span>Notificaciones</span>
          <span class="badge" *ngIf="notificacionesNoLeidas > 0">{{ notificacionesNoLeidas }}</span>
        </button>

        <section class="panel-notificaciones-navbar" *ngIf="panelNotificacionesAbierto" aria-label="Listado de notificaciones">
          <div class="panel-notificaciones-cabecera">
            <h2>Notificaciones</h2>
            <span *ngIf="notificacionesNoLeidas > 0">{{ notificacionesNoLeidas }} nuevas</span>
          </div>

          <div class="panel-notificaciones-vacio" *ngIf="notificacionesNavbar.length === 0">
            <ion-icon name="notifications-outline"></ion-icon>
            <p>Todavia no tienes notificaciones.</p>
          </div>

          <button
            class="notificacion-navbar-item"
            type="button"
            *ngFor="let notificacion of notificacionesNavbar"
            [class.no-leida]="!notificacion.leida"
            (click)="abrirNotificacionNavbar(notificacion)"
          >
            <span class="notificacion-navbar-icono">
              <ion-icon [name]="iconoNotificacionNavbar(notificacion)"></ion-icon>
            </span>

            <span class="notificacion-navbar-contenido">
              <strong>{{ notificacion.titulo }}</strong>
              <span>{{ notificacion.cuerpo }}</span>
              <small>
                {{ notificacion.tiempoTexto }}
                <span *ngIf="notificacion.nivel"> - {{ notificacion.nivel }}</span>
              </small>
            </span>

            <span class="notificacion-navbar-punto" *ngIf="!notificacion.leida"></span>
          </button>
        </section>
      </div>

      <button class="boton-mensajes boton-con-badge" *ngIf="estaLogueado" routerLink="/mensajes" aria-label="Mensajes">
        <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
        <span>Mensajes</span>
        <span class="badge" *ngIf="mensajesNoLeidos > 0">{{ mensajesNoLeidos }}</span>
      </button>

      <button class="boton-perfil" *ngIf="estaLogueado" routerLink="/mi-perfil" aria-label="Mi perfil">
        <ion-icon name="person-circle-outline"></ion-icon>
        <span>Mi perfil</span>
      </button>

      <button *ngIf="estaLogueado" (click)="logout()"> Logout </button>
    </div>
  </header>

  <ion-router-outlet></ion-router-outlet>

  <nav class="menu-movil" *ngIf="mostrarMenuMovil()" aria-label="Navegación principal">
    <a class="item-menu" routerLink="/principal" routerLinkActive="activo" [routerLinkActiveOptions]="{ exact: true }">
      <ion-icon name="home-outline"></ion-icon>
      <span>Inicio</span>
    </a>

    <a class="item-menu" routerLink="/buscador" routerLinkActive="activo">
      <ion-icon name="search-outline"></ion-icon>
      <span>Buscar</span>
    </a>

    <a class="item-menu item-agregar" *ngIf="estaLogueado" routerLink="/reporte-mascota" routerLinkActive="activo">
      <span class="icono-agregar">
        <ion-icon name="add-circle"></ion-icon>
      </span>

      <span>Agregar</span>
    </a>

    <a class="item-menu" routerLink="/mapa" routerLinkActive="activo">
      <ion-icon name="map-outline"></ion-icon>
      <span>Mapa</span>
    </a>

    <a class="item-menu" routerLink="/mascotas-halladas" routerLinkActive="activo">
      <ion-icon name="paw-outline"></ion-icon>

      <span>Halladas</span>
    </a>

  </nav>
</ion-app>
