<ion-header class="encabezado-hallazgos">
  <ion-toolbar>
    <ion-title>Hallazgos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="contenido-pagina">
  <main class="contenedor-pagina contenedor-con-padding contenedor-listado">
    <section class="presentacion-listado">
      <h1>Mascotas encontradas</h1>
      <p>Reportes publicados por la comunidad</p>
    </section>

    <p class="mensaje-estado" *ngIf="cargando">Cargando hallazgos...</p>

    <section class="estado-listado" *ngIf="!cargando && error">
      <p>{{ error }}</p>
      <button type="button" (click)="cargarHallazgos()">Reintentar</button>
    </section>

    <section class="estado-listado" *ngIf="!cargando && !error && hallazgos.length === 0">
      <ion-icon name="paw-outline"></ion-icon>
      <p>Todavía no hay hallazgos registrados.</p>
    </section>

    <section class="lista-hallazgos" *ngIf="!cargando && !error && hallazgos.length > 0">
      <article class="tarjeta-hallazgo" *ngFor="let hallazgo of hallazgos">
        <div class="foto-hallazgo">
          <img *ngIf="hallazgo.imagen; else iconoHallazgo" [src]="hallazgo.imagen" alt="Foto de la mascota encontrada">
          <ng-template #iconoHallazgo>
            <ion-icon name="paw-outline"></ion-icon>
          </ng-template>
        </div>

        <div class="datos-hallazgo">
          <h2>{{ hallazgo.nombre }}</h2>

          <p class="ubicacion-hallazgo">
            <ion-icon name="location-outline"></ion-icon>
            <span>{{ hallazgo.ubicacion }}</span>
          </p>

          <p>{{ hallazgo.descripcion }}</p>
        </div>
      </article>
    </section>
  </main>
</ion-content>
