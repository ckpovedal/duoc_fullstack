<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Sanos y Salvos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="video-container">
  
  <!-- Video de fondo -->
  <video #backgroundVideo autoplay muted loop playsinline id="background-video">
    <source src="assets/video/VideoInicio.mp4" type="video/mp4">
  </video>

  <!-- Capa oscura superpuesta (opcional, mejora visibilidad) -->
  <div class="overlay"></div>

  <img src="assets/icon/Sanos&Salvos.png" class="overlay-image" alt="Logo">

  <!-- Botón de inicio -->
  <div class="button-container">
    <ion-button expand="block" (click)="irALogin()" class="btn-inicio">
      <ion-icon name="paw-outline" slot="start"></ion-icon>
      Ingresar
    </ion-button>
  </div>

</ion-content>
